name: 🛡️ Amla Code Reviewer

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  pull-requests: write
  contents: read

jobs:
  amla-code-review:
    runs-on: ubuntu-latest

    steps:

      # ─────────────────────────────────────────────
      # Step 1: Checkout PR Repository
      # ─────────────────────────────────────────────
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # Step 2: Checkout Amla Rules Repository
      # ─────────────────────────────────────────────
      - name: Checkout Amla Rules Repository
        uses: actions/checkout@v4
        with:
          repository: usha-kakde-amla/Amla-code-Reviewer
          path: external-rules
          fetch-depth: 1

      # ─────────────────────────────────────────────
      # Step 3: List Rule Files
      # ─────────────────────────────────────────────
      - name: List rule files
        run: |
          echo "================================"
          echo " Rule files"
          echo "================================"

          ls -1 external-rules/rules/*.md 2>/dev/null || echo "No rules found"

      # ─────────────────────────────────────────────
      # Step 4: Setup .NET 8
      # ─────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ─────────────────────────────────────────────
      # Step 5: Build & Install Tool From Source
      # ─────────────────────────────────────────────
      - name: Build and Install Amla Reviewer Tool
        run: |

          cd external-rules/AmlaCodeReviewer.Tool

          dotnet restore

          dotnet pack -c Release -o ./nupkg

          dotnet tool install -g AmlaCodeReviewer.Tool \
            --add-source ./nupkg

          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # ─────────────────────────────────────────────
      # Step 6: Set PR URL
      # ─────────────────────────────────────────────
      - name: Set PR URL
        id: pr-url
        run: |
          PR_URL="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

          echo "PR URL:"
          echo "$PR_URL"

      # ─────────────────────────────────────────────
      # Step 7: Get Latest Commit SHA
      # ─────────────────────────────────────────────
      - name: Set Commit SHA
        run: |
          echo "COMMIT_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # Step 8: Run Amla Code Reviewer
      # ─────────────────────────────────────────────
      - name: Run Amla Code Reviewer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ env.COMMIT_SHA }}

        run: |

          RULES_DIR="./external-rules/AmlaCodeReviewer.Tool/rules"

          echo "================================"
          echo " Running Amla Code Reviewer"
          echo "================================"

          amla-review review \
            --pr "${{ steps.pr-url.outputs.pr_url }}" \
            --rules "$RULES_DIR" \
            --output report.json \
            --suggest-rules suggested-rules.json \
            --fail-on-error

      # ─────────────────────────────────────────────
      # Step 9: Upload Violations Report
      # ─────────────────────────────────────────────
      - name: Upload violations report
        if: hashFiles('report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: amla-report-pr-${{ github.event.pull_request.number }}
          path: report.json
          retention-days: 30

      # ─────────────────────────────────────────────
      # Step 10: Upload Suggested Rules
      # ─────────────────────────────────────────────
      - name: Upload suggested rules artifact
        if: hashFiles('suggested-rules.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: suggested-rules-pr-${{ github.event.pull_request.number }}
          path: suggested-rules.json
          retention-days: 30
